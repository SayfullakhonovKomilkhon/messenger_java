spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: ${PORT:3000}
  error:
    whitelabel:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  access-expires: ${JWT_ACCESS_EXPIRES:3600}
  refresh-expires: ${JWT_REFRESH_EXPIRES:2592000}

file:
  max-size-bytes: ${FILE_MAX_SIZE_BYTES:104857600}

r2:
  endpoint: ${R2_ENDPOINT}
  access-key-id: ${R2_ACCESS_KEY_ID}
  secret-access-key: ${R2_SECRET_ACCESS_KEY}
  bucket-name: ${R2_BUCKET_NAME}
  public-url: ${R2_PUBLIC_URL}

fcm:
  project-id: ${FCM_PROJECT_ID:}
  client-email: ${FCM_CLIENT_EMAIL:}
  private-key: ${FCM_PRIVATE_KEY:}

logging:
  level:
    root: INFO
    com.messenger: DEBUG
